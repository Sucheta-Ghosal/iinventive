version: "3"

services:

  frontend:
    build: .
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/iinventiveDB
    depends_on:
      - database

  database:
    image: mongo
    ports:
      - "27017:27017"
